name: HotelLakeview CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/HotelLakeview.slnx

      - name: Build solution
        run: dotnet build backend/HotelLakeview.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test backend/HotelLakeview.slnx --configuration Release --no-build --verbosity normal

  cd:
    name: Publish and deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API dependencies
        run: dotnet restore ./backend/src/HotelLakeview.Api/HotelLakeview.Api.csproj

      - name: Publish API
        run: dotnet publish ./backend/src/HotelLakeview.Api/HotelLakeview.Api.csproj --configuration Release --no-restore --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Hotel-Lakeview-API'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish