name: HotelLakeview Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: https://hotel-lakeview-api-cvcqg7cjambfcahw.switzerlandnorth-01.azurewebsites.net/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare standalone package
        run: |
          rm -rf publish frontend.zip
          mkdir -p publish

          cp -R frontend/.next/standalone/. publish/

          mkdir -p publish/.next
          cp -R frontend/.next/static publish/.next/static

          if [ -d frontend/public ]; then
            cp -R frontend/public publish/public
          fi

          echo "=== Publish content ==="
          ls -la publish

      - name: Verify standalone package
        run: |
          test -f publish/server.js
          test -d publish/node_modules
          test -f publish/node_modules/next/package.json
          test -d publish/.next/static

      - name: Zip standalone package
        run: |
          cd publish
          zip -r ../frontend.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Hotel-Lakeview-Frontend"
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend.zip
          clean: true