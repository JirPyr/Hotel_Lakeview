name: Build and deploy HotelLakeview API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/HotelLakeview.Api/HotelLakeview.Api.csproj

      - name: Build
        run: dotnet build ./src/HotelLakeview.Api/HotelLakeview.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./src/HotelLakeview.Api/HotelLakeview.Api.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Hotel-Lakeview-API'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish